name: PR pipeline

on:
  pull_request:
    branches: ['main', 'dev']

jobs:
  lint_test:
    name: Lint and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.22.0]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build
